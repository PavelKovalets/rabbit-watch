version: '3.8'
services:
  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # Inference is NOT containerized: the brain calls LM Studio on the Hyper-V
  # host (OpenAI-compatible API over the internal vSwitch).
  # See spec/infrastructure.md for the topology.

volumes:
  redis-data: {}
